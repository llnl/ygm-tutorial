name: Build tutorial image

on:
  push:
    # TODO for testing
    # branches: ["main"]
    branches: ["tdrwenski-add-dockerfile-openvscode"]
  pull_request:
    # TODO for testing
    # branches: ["main"]
    branches: ["tdrwenski-add-dockerfile-openvscode"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/tutorial

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "latest=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"
          echo "sha=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build docker image
        run: |
          docker build \
            --file containers/tutorial/Dockerfile \
            --tag "${{ steps.tags.outputs.latest }}" \
            --tag "${{ steps.tags.outputs.sha }}" \
            .

      - name: Push docker image
        if: github.event_name != 'pull_request'
        run: |
          docker push "${{ steps.tags.outputs.latest }}"
          docker push "${{ steps.tags.outputs.sha }}"
